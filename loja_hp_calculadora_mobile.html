<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Loja HP</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;background:#f5f7fb;color:#162033;padding-bottom:105px}header{background:linear-gradient(135deg,#043a7c,#10c6d5);color:#fff;padding:20px 16px 24px;border-radius:0 0 28px 28px;box-shadow:0 10px 24px #0003;position:sticky;top:0;z-index:50}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:0;font-size:24px}.sub{margin:6px 0 0;opacity:.92;font-size:13px}.cartBubble{background:#fff;color:#043a7c;border-radius:999px;padding:10px 13px;font-weight:bold;box-shadow:0 6px 16px #0003;white-space:nowrap}main{max-width:560px;margin:auto;padding:14px}.searchBox,.cartPanel,.discountBox{background:#fff;border-radius:20px;padding:14px;box-shadow:0 7px 18px #00000014;border:1px solid #e4edf7}.searchBox{margin-top:-4px}input,select{width:100%;padding:14px;border:1px solid #d4dfeb;border-radius:14px;font-size:16px;background:#fff;outline:none}.chips{display:flex;gap:8px;overflow-x:auto;padding:14px 0 4px}.chip{border:0;background:#fff;color:#043a7c;padding:10px 13px;border-radius:999px;font-weight:bold;white-space:nowrap;box-shadow:0 4px 12px #0001}.chip.active{background:#043a7c;color:#fff}.sectionTitle{margin:18px 2px 10px;color:#063a80;font-size:18px;font-weight:bold}.products{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.product{background:#fff;border-radius:20px;overflow:hidden;border:1px solid #e4edf7;box-shadow:0 7px 18px #00000014}.img{height:112px;background:linear-gradient(135deg,#e9f8ff,#fff);display:flex;align-items:center;justify-content:center;font-size:48px}.info{padding:12px}.name{font-weight:bold;color:#063a80;min-height:38px;font-size:14px;line-height:1.25}.price{color:#009b45;font-weight:bold;margin-top:8px;font-size:17px}.mini{font-size:11px;color:#6a7d90;margin-top:4px;min-height:28px;line-height:1.25}.controls{display:grid;gap:7px;margin-top:10px}.qtyRow{display:grid;grid-template-columns:34px 1fr 34px;gap:6px;align-items:center}.qtyRow button{border:0;border-radius:10px;background:#eaf3ff;color:#043a7c;font-weight:bold;font-size:18px;padding:8px 0}.qtyRow input{text-align:center;padding:9px;font-size:14px}.addBtn{border:0;border-radius:12px;background:#009b45;color:#fff;padding:11px;font-weight:bold;width:100%}.cartPanel,.discountBox{margin-top:12px}.cartItem{display:grid;grid-template-columns:42px 1fr 34px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #edf2f7}.cartItem:last-child{border-bottom:0}.cartIcon{width:42px;height:42px;border-radius:14px;background:#eef9ff;display:flex;align-items:center;justify-content:center;font-size:23px}.cartName{font-weight:bold;font-size:14px;color:#063a80}.cartDesc{font-size:12px;color:#65798d;margin-top:3px}.cartValue{color:#009b45;font-weight:bold;font-size:14px;margin-top:3px}.removeBtn{border:0;background:#ffe7e9;color:#d92336;border-radius:10px;padding:8px;font-weight:bold}.empty{border:2px dashed #cfd8e3;border-radius:16px;padding:22px;text-align:center;color:#6b7c8f;font-size:14px}label{display:block;margin:10px 0 6px;font-size:13px;font-weight:bold}.clearBtn{margin-top:12px;border:0;border-radius:14px;background:#e63946;color:#fff;padding:13px;font-weight:bold;width:100%}.bottomBar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #dbe7f2;box-shadow:0 -8px 24px #0002;padding:11px 14px;z-index:60}.bottomInner{max-width:560px;margin:auto;display:grid;grid-template-columns:1fr 128px;gap:10px;align-items:center}.totalLabel{font-size:11px;color:#60758a;font-weight:bold}.totalFinal{font-size:24px;color:#009b45;font-weight:bold;line-height:1.1}.economia{font-size:12px;color:#04753a;font-weight:bold;margin-top:2px}.checkoutBtn{border:0;border-radius:14px;background:#063a80;color:#fff;padding:13px 8px;font-weight:bold}.summary{margin-top:12px;font-size:13px}.line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #edf2f7}.line:last-child{border-bottom:0}@media(min-width:620px){.products{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<header><div class="top"><div><h1>Loja HP</h1><p class="sub">Escolha como uma lojinha e o total soma sozinho.</p></div><div class="cartBubble">🛒 <span id="cartCount">0</span></div></div></header>
<main>
<div class="searchBox"><input id="search" placeholder="Buscar item, exame, parto..." oninput="renderProducts()"><div class="chips"><button class="chip active" onclick="setCategory('todos',this)">Todos</button><button class="chip" onclick="setCategory('hospital',this)">Hospital</button><button class="chip" onclick="setCategory('parto',this)">Partos</button><button class="chip" onclick="setCategory('plano',this)">Planos</button><button class="chip" onclick="setCategory('farmacia',this)">Farmácia</button><button class="chip" onclick="setCategory('cirurgia',this)">Cirurgia</button></div></div>
<div class="sectionTitle">Produtos e serviços</div><section class="products" id="products"></section>
<div class="sectionTitle" id="cartTitle">Carrinho</div><section class="cartPanel" id="cartArea"></section>
<section class="discountBox"><div class="sectionTitle" style="margin-top:0">Desconto geral</div><label>Aplicar desconto no carrinho todo</label><select id="generalDiscount" onchange="updateCart()"><option value="0">Sem desconto geral</option><option value="5">5%</option><option value="10">10%</option><option value="15">15%</option><option value="20">20%</option><option value="30">30%</option><option value="custom">Personalizado</option></select><label>Desconto personalizado (%)</label><input id="customGeneralDiscount" type="number" min="0" max="100" value="0" oninput="updateCart()"><div class="summary"><div class="line"><span>Subtotal:</span><strong id="subtotal">R$ 0,00</strong></div><div class="line"><span>Desconto geral:</span><strong id="generalDiscountText">R$ 0,00</strong></div><div class="line"><span>Itens:</span><strong id="itemsTotal">0</strong></div></div><button class="clearBtn" onclick="clearCart()">Limpar carrinho</button></section>
</main>
<div class="bottomBar"><div class="bottomInner"><div><div class="totalLabel">TOTAL FINAL</div><div class="totalFinal" id="finalTotal">R$ 0,00</div><div class="economia" id="economy">Economia: R$ 0,00</div></div><button class="checkoutBtn" onclick="scrollToCart()">Ver carrinho</button></div></div>
<script>
const items=[{name:"Raio-X",icon:"🩻",cat:"hospital",normal:2500,parceria:2000,plano:2125},{name:"Gesso",icon:"🦴",cat:"hospital",normal:3000,parceria:2400,plano:2550},{name:"Exames básicos",icon:"🧪",cat:"hospital",normal:3500,parceria:2800,plano:2975},{name:"Exames complexos",icon:"🔬",cat:"hospital",normal:8000,parceria:6400,plano:6800},{name:"Consulta especialista",icon:"🩺",cat:"hospital",normal:120000,parceria:96000,plano:102000},{name:"Parto normal HP",icon:"👶",cat:"parto",normal:300000,parceria:240000,plano:255000},{name:"Parto cesariana",icon:"🏥",cat:"parto",normal:560000,parceria:448000,plano:552500},{name:"Parto em casa",icon:"🏠",cat:"parto",normal:850000,parceria:680000,plano:722500},{name:"Plano de saúde",icon:"💳",cat:"plano",normal:100000,parceria:100000,plano:100000},{name:"Plano família 1",icon:"👨‍👩‍👧",cat:"plano",normal:300000,parceria:350000,plano:350000},{name:"Plano família 2",icon:"👨‍👩‍👧‍👦",cat:"plano",normal:500000,parceria:500000,plano:500000},{name:"Kit Médico",icon:"💊",cat:"farmacia",normal:3000,min:2500,max:3000},{name:"Bandagem",icon:"🩹",cat:"farmacia",normal:500,min:300,max:500},{name:"Tratamento",icon:"💉",cat:"farmacia",normal:2500,min:2000,max:2500},{name:"Adrenalina",icon:"⚡",cat:"farmacia",normal:7000,min:6000,max:7000},{name:"Atadura",icon:"🤕",cat:"farmacia",normal:200,min:100,max:200},{name:"Cirurgia PLA",icon:"⚕️",cat:"cirurgia",normal:1500000,min:500000,max:1500000,obs:"Vai para prefeitura"}];
let category="todos",cart=[];
function money(v){return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function setCategory(cat,btn){category=cat;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));btn.classList.add("active");renderProducts()}
function priceInfo(item){let p=[];if(item.parceria!==undefined)p.push("Parceria: "+money(item.parceria));if(item.plano!==undefined)p.push("Plano: "+money(item.plano));if(item.min!==undefined)p.push("Min: "+money(item.min));if(item.max!==undefined)p.push("Max: "+money(item.max));return p.join("<br>")}
function getItemPrice(item,type,custom){if(type==="parceria")return item.parceria??item.normal*.8;if(type==="plano")return item.plano??item.normal*.85;if(type==="min")return item.min??item.normal;if(type==="max")return item.max??item.normal;if(type==="custom")return item.normal*(1-custom/100);return item.normal}
function discountOptions(item,id){let h=`<select id="discount-${id}"><option value="normal">Normal</option><option value="custom">Desc. próprio</option>`;if(item.parceria!==undefined)h+=`<option value="parceria">Parceria 20%</option>`;if(item.plano!==undefined)h+=`<option value="plano">Plano 15%</option>`;if(item.min!==undefined)h+=`<option value="min">Mínimo</option>`;if(item.max!==undefined)h+=`<option value="max">Máximo</option>`;return h+`</select><input id="custom-${id}" type="number" min="0" max="100" value="10" placeholder="% desconto">`}
function renderProducts(){const s=document.getElementById("search").value.toLowerCase(),box=document.getElementById("products");box.innerHTML="";items.filter(it=>(category==="todos"||it.cat===category)&&it.name.toLowerCase().includes(s)).forEach((item,id)=>{let d=document.createElement("div");d.className="product";d.innerHTML=`<div class="img">${item.icon}</div><div class="info"><div class="name">${item.name}</div><div class="price">${money(item.normal)}</div><div class="mini">${priceInfo(item)} ${item.obs?"<br><b>"+item.obs+"</b>":""}</div><div class="controls"><div class="qtyRow"><button onclick="changeQty(${id},-1)">-</button><input id="qty-${id}" type="number" min="1" value="1"><button onclick="changeQty(${id},1)">+</button></div>${discountOptions(item,id)}<button class="addBtn" onclick="addToCart(${id})">Adicionar</button></div></div>`;box.appendChild(d)})}
function changeQty(id,delta){let i=document.getElementById("qty-"+id);i.value=Math.max(1,(Number(i.value)||1)+delta)}
function discountName(type,custom){return {normal:"Normal",parceria:"Parceria 20%",plano:"Plano 15%",min:"Valor mínimo",max:"Valor máximo",custom:"Desconto "+custom+"%"}[type]||type}
function addToCart(id){const item=items[id],qty=Number(document.getElementById("qty-"+id).value)||1,type=document.getElementById("discount-"+id).value,custom=Number(document.getElementById("custom-"+id).value)||0,unit=getItemPrice(item,type,custom);cart.push({name:item.name,icon:item.icon,qty,type,custom,unit,total:unit*qty,normalTotal:item.normal*qty});updateCart()}
function removeCart(i){cart.splice(i,1);updateCart()}
function generalDiscountPercent(){let t=document.getElementById("generalDiscount").value;return t==="custom"?(Number(document.getElementById("customGeneralDiscount").value)||0):(Number(t)||0)}
function updateCart(){let area=document.getElementById("cartArea");area.innerHTML=cart.length?cart.map((c,i)=>`<div class="cartItem"><div class="cartIcon">${c.icon}</div><div><div class="cartName">${c.name}</div><div class="cartDesc">${c.qty}x • ${discountName(c.type,c.custom)} • Unit: ${money(c.unit)}</div><div class="cartValue">${money(c.total)}</div></div><button class="removeBtn" onclick="removeCart(${i})">X</button></div>`).join(""):`<div class="empty">Seu carrinho está vazio. Adicione itens acima.</div>`;const sub=cart.reduce((a,c)=>a+c.total,0),normal=cart.reduce((a,c)=>a+c.normalTotal,0),pct=generalDiscountPercent(),disc=sub*(pct/100),final=sub-disc,eco=normal-final,count=cart.reduce((a,c)=>a+c.qty,0);document.getElementById("subtotal").textContent=money(sub);document.getElementById("generalDiscountText").textContent=money(disc)+" ("+pct+"%)";document.getElementById("finalTotal").textContent=money(final);document.getElementById("economy").textContent=eco>=0?"Economia: "+money(eco):"Acréscimo: "+money(Math.abs(eco));document.getElementById("itemsTotal").textContent=count;document.getElementById("cartCount").textContent=count}
function clearCart(){cart=[];updateCart()}
function scrollToCart(){document.getElementById("cartTitle").scrollIntoView({behavior:"smooth"})}
renderProducts();updateCart();
</script>
</body>
</html>
